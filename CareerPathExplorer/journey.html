<!-- 🔐 LOGIN PROTECTION -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const idToken = localStorage.getItem("idToken");

    // Not logged in → redirect
    if (!idToken) {
        window.location.href = "login.html";
        return;
    }

    // Update navbar
    const authButtons = document.getElementById("auth-buttons");
    const userMenu = document.getElementById("user-menu");
    const usernameSpan = document.getElementById("username");

    authButtons.style.display = "none";
    userMenu.style.display = "flex";

    try {
        const payload = JSON.parse(atob(idToken.split(".")[1]));
        usernameSpan.textContent = payload.email || "User";
    } catch (e) {
        localStorage.clear();
        window.location.href = "login.html";
    }
});

// Logout via Cognito Hosted UI
function logout() {
    localStorage.clear();
    window.location.href =
      "https://ap-south-1fzlcxymni.auth.ap-south-1.amazoncognito.com/logout" +
      "?client_id=no8u3mv9ivnuhj6b0c5e20jfp" +
      "&logout_uri=https://dyrse1k3951wn.cloudfront.net/login.html";
}
</script>




<script>
// Apply translation when page loads
document.addEventListener('DOMContentLoaded', function() {
    // If translation service is available and language is not English
    if (window.TranslationService && TranslationService.currentLanguage !== 'en') {
        console.log('🔄 Applying translation to page...');
        
        // Small delay to ensure DOM is fully loaded
        setTimeout(() => {
            translatePageContent();
        }, 500);
    }
});

// Function to translate all text content on the page
async function translatePageContent() {
    if (!window.TranslationService) return;
    
    const elementsToTranslate = [
        // Navigation and headers
        ...document.querySelectorAll('h1, h2, h3, h4, h5, h6, p, a, button, span, label'),
        // Specific elements by class or ID
        ...document.querySelectorAll('.nav-link, .btn, .logo, .footer-text'),
        // Hero section
        ...document.querySelectorAll('.hero-title, .hero-subtitle, .hero-description'),
        // Career cards
        ...document.querySelectorAll('.career-card h3, .career-card p, .career-card .career-category'),
        // Filter buttons
        ...document.querySelectorAll('.filter-btn'),
        // Placeholder text
        document.querySelector('input[placeholder]')
    ].filter(el => el && el.innerText && el.innerText.trim() !== '');
    
    console.log(`Found ${elementsToTranslate.length} elements to translate`);
    
    for (const element of elementsToTranslate) {
        // Skip elements that should not be translated
        if (element.tagName === 'INPUT' && element.placeholder) {
            // Translate placeholder
            const originalPlaceholder = element.placeholder;
            if (originalPlaceholder && !originalPlaceholder.startsWith('_translated_')) {
                try {
                    const translated = await TranslationService.translateText(originalPlaceholder);
                    element.placeholder = translated;
                } catch (error) {
                    console.warn('Failed to translate placeholder:', error);
                }
            }
        } else if (element.innerText && !element.innerText.startsWith('_translated_')) {
            // Translate inner text
            const originalText = element.innerText;
            if (originalText && !originalText.match(/^\d+$/) && originalText.length > 1) {
                try {
                    const translated = await TranslationService.translateText(originalText);
                    element.innerText = translated;
                } catch (error) {
                    console.warn('Failed to translate text:', error);
                }
            }
        }
    }
    
    console.log('✅ Page translation complete');
}

// Listen for language changes
document.addEventListener('languageChanged', function() {
    console.log('Language changed, reloading page...');
    window.location.reload();
});
</script>
